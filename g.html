<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Կրիպտո Համալրում</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .user-badge {
            text-align: center;
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 15px;
            background: #1a1f2b;
            padding: 8px;
            border-radius: 20px;
        }
        .balance-box {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            color: #3fb950;
            margin: 15px 0;
            padding: 18px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
        }
        .balance-label {
            font-size: 12px;
            color: #8b949e;
            font-weight: normal;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            color: #8b949e;
            font-size: 13px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        select { cursor: pointer; }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s, transform 0.1s;
        }
        .btn:hover { background: #2ea043; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #30363d; cursor: not-allowed; }
        
        .payment-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #0d1117;
            border: 1px solid #3fb950;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.4s;
        }
        .payment-box.show { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pay-title {
            color: #3fb950;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .pay-amount {
            font-size: 28px;
            font-weight: bold;
            color: #d2991d;
            margin: 10px 0;
        }
        .pay-address {
            background: #1a1f2b;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #58a6ff;
            margin: 15px 0;
            border: 1px dashed #30363d;
            user-select: all;
            cursor: pointer;
        }
        .copy-btn {
            display: inline-block;
            background: #30363d;
            color: #c9d1d9;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .copy-btn:hover { background: #444; }
        .copied { color: #3fb950; font-size: 12px; display: none; }
        
        .status-box {
            background: #1a1f2b;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
        }
        .status-pending { color: #d2991d; }
        .status-waiting { color: #58a6ff; }
        .status-finished { color: #3fb950; }
        
        .warning {
            background: #1a1f2b;
            border-left: 3px solid #d2991d;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            color: #8b949e;
            border-radius: 0 8px 8px 0;
            text-align: left;
        }
        
        .history {
            margin-top: 25px;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }
        .history h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 10px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: #1a1f2b;
            border-radius: 6px;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .history-amount { color: #3fb950; }
        .history-status { font-size: 11px; }
        
        .error {
            background: #3d1f1f;
            color: #f85149;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Crypto TopUp</h1>
        <div class="user-badge" id="userBadge"></div>
        <div class="balance-box">
            <div class="balance-label">ԸՆԹԱՑԻԿ ԲԱԼԱՆՍ</div>
            <span id="balanceAmount">0.00</span> USDT
        </div>
        
        <form id="topupForm">
            <label>💰 Գումար (USD)</label>
            <input type="number" id="amount" value="10" min="1" max="10000" step="1" required>
            
            <label>🌐 Ցանց / Կրիպտոարժույթ</label>
            <select id="currency">
                <optgroup label="USDT (Խորհուրդ է տրվում)">
                    <option value="usdttrc20">USDT TRC20 (Tron) — 0% ցանցի վճար*</option>
                    <option value="usdtbsc">USDT BEP20 (BSC) — 0% ցանցի վճար*</option>
                    <option value="usdterc20">USDT ERC20 (Ethereum) — ցանցի վճար</option>
                </optgroup>
                <optgroup label="Այլ կրիպտոարժույթներ">
                    <option value="btc">Bitcoin (BTC)</option>
                    <option value="eth">Ethereum (ETH)</option>
                    <option value="ltc">Litecoin (LTC)</option>
                    <option value="doge">Dogecoin (DOGE)</option>
                    <option value="trx">TRON (TRX)</option>
                    <option value="bnb">BNB (BSC)</option>
                    <option value="matic">Polygon (MATIC)</option>
                    <option value="sol">Solana (SOL)</option>
                    <option value="ton">TON</option>
                    <option value="xrp">XRP</option>
                </optgroup>
            </select>
            
            <button type="submit" class="btn" id="submitBtn">🔄 Ստեղծել Վճարման Հասցե</button>
        </form>
        
        <div class="error" id="errorBox"></div>
        
        <div class="payment-box" id="paymentBox">
            <div class="pay-title">✅ Հասցեն ստեղծված է</div>
            <div class="pay-amount" id="payAmount"></div>
            <div>Ուղարկեք այս հասցեին</div>
            <div class="pay-address" id="payAddress" onclick="copyAddress()" title="Սեղմեք պատճենելու համար"></div>
            <button class="copy-btn" onclick="copyAddress()">📋 Պատճենել Հասցեն</button>
            <span class="copied" id="copiedMsg">Պատճենված է ✓</span>
            
            <div class="status-box">
                <span id="statusIcon">⏳</span>
                <span id="statusText">Սպասում ենք վճարմանը...</span>
            </div>
            
            <div class="warning">
                ⚠️ <b>Կարևոր.</b> Ուղարկեք <b>ճիշտ ցանցով</b> (TRC20/BEP20):<br>
                💡 Էջը կարող եք փակել — վճարումից հետո բալանսը կհամալրվի:<br>
                ⏱ Վճարումը մշակվում է 1-5 րոպեում:
            </div>
        </div>
        
        <div class="history" id="historyBox" style="display:none;">
            <h3>📋 Վերջին համալրումները</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // ==================== ԿՈՆՖԻԳՈՒՐԱՑԻԱ ====================
        const API_KEY = 'MEWGX85-J0Q4M0E-G08GHSR-XVGJARZ'; // <-- ՓՈԽԵՔ ՍԱ ՁԵՐ API KEY-ՈՎ!!!
        const API_URL = 'https://api.nowpayments.io/v1';
        
        // ==================== ՕԳՏԱՏԵՐԻ ՍԻՄՈՒԼԱՑԻԱ (LocalStorage) ====================
        let userId = localStorage.getItem('crypto_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            localStorage.setItem('crypto_user_id', userId);
        }
        
        let username = localStorage.getItem('crypto_username') || 'User' + userId.substr(-4);
        if (!localStorage.getItem('crypto_username')) {
            localStorage.setItem('crypto_username', username);
        }
        
        let balance = parseFloat(localStorage.getItem('crypto_balance_' + userId)) || 0;
        let history = JSON.parse(localStorage.getItem('crypto_history_' + userId)) || [];
        let activeInvoices = JSON.parse(localStorage.getItem('crypto_active_' + userId)) || [];
        
        document.getElementById('userBadge').textContent = `🆔 ${username} | ID: ${userId.substr(-8)}`;
        document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        
        if (history.length > 0) {
            document.getElementById('historyBox').style.display = 'block';
            renderHistory();
        }
        
        // Ստուգում ենք ակտիվ ինվոյսները էջը բացելիս
        activeInvoices.forEach(inv => checkInvoiceStatus(inv.id, inv.orderId, inv.amount));
        
        // ==================== ՖՈՐՄԱՅԻ ՄՇԱԿՈՒՄ ====================
        document.getElementById('topupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const submitBtn = document.getElementById('submitBtn');
            
            if (amount < 1) {
                showError('Գումարը պետք է լինի նվազագույնը 1 USD');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Ստեղծվում է...';
            hideError();
            
            const orderId = userId + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            try {
                const response = await fetch(`${API_URL}/invoice`, {
                    method: 'POST',
                    headers: {
                        'x-api-key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        price_amount: amount,
                        price_currency: 'usd',
                        pay_currency: currency,
                        order_id: orderId
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'API սխալ: Ստուգեք API Key-ը');
                }
                
                // Ցույց ենք տալիս վճարման տվյալները
                document.getElementById('payAmount').textContent = 
                    `Ուղարկեք ${data.pay_amount} ${currency.toUpperCase()}`;
                document.getElementById('payAddress').textContent = data.pay_address;
                document.getElementById('paymentBox').classList.add('show');
                document.getElementById('statusIcon').textContent = '⏳';
                document.getElementById('statusText').textContent = 'Սպասում ենք վճարմանը...';
                document.getElementById('statusText').className = 'status-pending';
                
                // Պահում ենք ակտիվ ինվոյսը
                const activeInvoice = {
                    id: data.id,
                    orderId: orderId,
                    amount: amount,
                    currency: currency,
                    address: data.pay_address,
                    payAmount: data.pay_amount,
                    time: Date.now()
                };
                
                activeInvoices.push(activeInvoice);
                localStorage.setItem('crypto_active_' + userId, JSON.stringify(activeInvoices));
                
                // Սկսում ենք ստուգել կարգավիճակը
                checkInvoiceStatus(data.id, orderId, amount);
                
                // Scroll դեպի վճարման բլոկ
                document.getElementById('paymentBox').scrollIntoView({ behavior: 'smooth' });
                
            } catch (err) {
                showError('Սխալ: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔄 Ստեղծել Վճարման Հասցե';
            }
        });
        
        // ==================== ՎՃԱՐՄԱՆ ՍՏՈՒԳՈՒՄ ====================
        async function checkInvoiceStatus(invoiceId, orderId, amount) {
            const maxChecks = 120; // 10 րոպե (5 վ * 120)
            let checks = 0;
            
            const checkInterval = setInterval(async () => {
                checks++;
                
                try {
                    const response = await fetch(`${API_URL}/invoice/${invoiceId}`, {
                        headers: { 'x-api-key': API_KEY }
                    });
                    const data = await response.json();
                    const status = data.payment_status;
                    
                    if (status === 'finished') {
                        clearInterval(checkInterval);
                        
                        // Թարմացնում ենք բալանսը
                        balance += amount;
                        localStorage.setItem('crypto_balance_' + userId, balance);
                        document.getElementById('balanceAmount').textContent = balance.toFixed(2);
                        
                        // Թարմացնում ենք UI
                        document.getElementById('statusIcon').textContent = '✅';
                        document.getElementById('statusText').textContent = 
                            `Վճարումը ստացված է! +${amount.toFixed(2)} USDT`;
                        document.getElementById('statusText').className = 'status-finished';
                        
                        // Ավելացնում ենք պատմության մեջ
                        history.unshift({
                            amount: amount,
                            currency: data.pay_currency,
                            time: new Date().toLocaleString('hy-AM'),
                            status: 'finished',
                            orderId: orderId
                        });
                        if (history.length > 10) history.pop();
                        localStorage.setItem('crypto_history_' + userId, JSON.stringify(history));
                        
                        // Հեռացնում ենք ակտիվ ինվոյսներից
                        removeActiveInvoice(invoiceId);
                        
                        // Ցույց ենք տալիս պատմությունը
                        document.getElementById('historyBox').style.display = 'block';
                        renderHistory();
                        
                    } else if (status === 'waiting' || status === 'confirming') {
                        document.getElementById('statusIcon').textContent = '🟡';
                        document.getElementById('statusText').textContent = 
                            `Վճարումը տեսանելի է, սպասում ենք հաստատման... (${status})`;
                        document.getElementById('statusText').className = 'status-waiting';
                        
                    } else if (status === 'expired') {
                        clearInterval(checkInterval);
                        document.getElementById('statusIcon').textContent = '❌';
                        document.getElementById('statusText').textContent = 'Ժամկետն անցել է, փորձեք նորից';
                        document.getElementById('statusText').className = 'status-pending';
                        removeActiveInvoice(invoiceId);
                        
                    } else if (status === 'failed') {
                        clearInterval(checkInterval);
                        document.getElementById('statusIcon').textContent = '❌';
                        document.getElementById('statusText').textContent = 'Վճարումը ձախողվել է';
                        document.getElementById('statusText').className = 'status-pending';
                        removeActiveInvoice(invoiceId);
                    }
                    
                    if (checks >= maxChecks) {
                        clearInterval(checkInterval);
                        document.getElementById('statusIcon').textContent = '⏰';
                        document.getElementById('statusText').textContent = 
                            'Սպասման ժամանակը լրացել է: Եթե վճարել եք, բալանսը շուտով կթարմացվի:';
                        removeActiveInvoice(invoiceId);
                    }
                    
                } catch (err) {
                    console.log('Check error:', err);
                    if (checks >= maxChecks) clearInterval(checkInterval);
                }
            }, 5000); // Ստուգում ենք 5 վայրկյանը մեկ
        }
        
        function removeActiveInvoice(invoiceId) {
            activeInvoices = activeInvoices.filter(inv => inv.id !== invoiceId);
            localStorage.setItem('crypto_active_' + userId, JSON.stringify(activeInvoices));
        }
        
        // ==================== ՕԳՆԱԿԱՆ ՖՈՒՆԿՑԻԱՆԵՐ ====================
        function copyAddress() {
            const address = document.getElementById('payAddress').textContent;
            if (!address) return;
            
            navigator.clipboard.writeText(address).then(() => {
                const msg = document.getElementById('copiedMsg');
                msg.style.display = 'inline';
                setTimeout(() => msg.style.display = 'none', 2000);
            });
        }
        
        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = '❌ ' + msg;
            box.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorBox').style.display = 'none';
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <span>${h.time}</span>
                    <span class="history-amount">+${h.amount.toFixed(2)} USDT</span>
                    <span class="history-status" style="color:#3fb950;">✓</span>
                </div>
            `).join('');
        }
        
        // ==================== ՍՏԵՂԾՈՒՄ ԵՆՔ ՆԱԽՆԱԿԱՆ ՏՎՅԱԼՆԵՐ (ըստ ցանկության) ====================
        console.log('🔐 Ձեր ID:', use
