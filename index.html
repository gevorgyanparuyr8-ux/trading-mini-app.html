<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fenix Trade</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  :root{
    --bg:#0a0e17; --panel:#111827; --panel2:#0d1420; --line:#1e2a3d;
    --txt:#e8eef6; --dim:#7d8ba0; --up:#00d68f; --down:#ff4d6a;
    --gold:#ffb020; --glow:rgba(255,176,32,.35);
    --f-disp:'Bebas Neue',Impact,sans-serif; --f-body:'Inter',system-ui,sans-serif;
    --f-mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:var(--f-body);overflow-x:hidden;
    background-image:radial-gradient(circle at 50% -10%,rgba(255,176,32,.08),transparent 45%)}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    border-bottom:1px solid var(--line);background:rgba(10,14,23,.9);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#ff7a18);
    display:grid;place-items:center;font-family:var(--f-disp);font-size:20px;color:#1a1206;box-shadow:0 0 18px var(--glow)}
  .brand b{font-family:var(--f-disp);font-size:22px;letter-spacing:1px}
  .brand span{color:var(--gold)}
  .bal{text-align:right}
  .bal .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .bal .amt{font-family:var(--f-mono);font-weight:700;font-size:17px;color:var(--up)}
  .symrow{padding:10px 16px 6px;position:relative}
  .symbtn{width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:11px 14px;border:1px solid var(--line);background:var(--panel);border-radius:12px;cursor:pointer}
  .symbtn .l{display:flex;align-items:center;gap:10px}
  .symbtn .tk{font-family:var(--f-mono);font-weight:700;font-size:15px}
  .symbtn .nm{font-size:11px;color:var(--dim)}
  .symbtn .px{text-align:right}
  .symbtn .px .v{font-family:var(--f-mono);font-weight:700;font-size:15px}
  .symbtn .px .ch{font-size:11px;font-weight:600}
  .chev{color:var(--dim);margin-left:8px}
  .search{position:absolute;left:16px;right:16px;top:58px;background:var(--panel);border:1px solid var(--gold);
    border-radius:12px;z-index:30;max-height:340px;overflow:hidden;display:none;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .search.open{display:block}
  .search input{width:100%;padding:12px 14px;background:var(--panel2);border:none;border-bottom:1px solid var(--line);
    color:var(--txt);font-size:14px;outline:none}
  .list{max-height:284px;overflow-y:auto}
  .list .it{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--panel2)}
  .list .it:active{background:var(--panel2)}
  .list .it .tk{font-family:var(--f-mono);font-weight:600;font-size:13px}
  .list .it .nm{font-size:11px;color:var(--dim)}
  .tfrow{display:flex;gap:6px;padding:4px 16px 8px;overflow-x:auto}
  .tfrow button{flex:0 0 auto;padding:7px 13px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);
    border-radius:9px;font-family:var(--f-mono);font-weight:600;font-size:12px;cursor:pointer;transition:.15s}
  .tfrow button.on{background:rgba(255,176,32,.12);color:var(--gold);border-color:var(--gold)}
  .tfrow .sep{flex:0 0 auto;width:1px;background:var(--line);margin:4px 2px}
  .tfrow .ind{flex:0 0 auto;padding:7px 11px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);
    border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .tfrow .ind.on{background:rgba(0,214,143,.1);color:var(--up);border-color:var(--up)}
  .chart{position:relative;margin:0 16px;border:1px solid var(--line);border-radius:14px;overflow:hidden;
    height:320px;background:var(--panel2)}
  #chartEl{width:100%;height:100%}
  .livebadge{position:absolute;top:10px;left:10px;display:flex;gap:6px;align-items:center;
    background:rgba(10,14,23,.75);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;backdrop-filter:blur(4px);z-index:5}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 1.4s infinite}
  .dot.off{background:var(--dim);animation:none}
  .src{font-size:9px;color:var(--dim);margin-left:2px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .chart-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
    background:var(--panel2);z-index:8;color:var(--dim);font-size:13px;text-align:center;padding:20px}
  .chart-load.hide{display:none}
  .spin{width:24px;height:24px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .retry{color:var(--gold);text-decoration:underline;cursor:pointer}
  .trades{margin:8px 16px 0;display:flex;flex-direction:column;gap:6px}
  .tcard{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:11px;
    border:1px solid var(--line);background:var(--panel);font-size:12px}
  .tcard .l{display:flex;align-items:center;gap:9px;min-width:0}
  .tcard .badge{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-weight:700;font-size:13px;flex:0 0 auto}
  .tcard.up .badge{background:rgba(0,214,143,.15);color:var(--up)}
  .tcard.down .badge{background:rgba(255,77,106,.15);color:var(--down)}
  .tcard .meta{min-width:0}
  .tcard .meta .top{font-family:var(--f-mono);font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcard .meta .bot{color:var(--dim);font-size:10px}
  .tcard .r{text-align:right;flex:0 0 auto}
  .tcard .pnl{font-family:var(--f-mono);font-weight:700;font-size:13px}
  .tcard .cd{font-family:var(--f-mono);font-size:11px;color:var(--gold)}
  .trades-hd{display:flex;justify-content:space-between;align-items:center;padding:0 2px 2px;font-size:11px;color:var(--dim)}
  .trades-hd b{color:var(--txt);font-weight:600}
  .panel{margin:10px 16px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px}
  .fld label{display:block;font-size:11px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .amtwrap{position:relative}
  .amtwrap .cur{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-weight:600}
  .amtwrap input{width:100%;padding:12px 12px 12px 26px;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;color:var(--txt);font-family:var(--f-mono);font-weight:700;font-size:16px;outline:none}
  .amtwrap input:focus{border-color:var(--gold)}
  .chips{display:flex;gap:6px;margin-top:8px}
  .chips button{flex:1;padding:7px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--dim);font-size:12px;font-weight:600;cursor:pointer}
  .chips button:active{border-color:var(--gold);color:var(--gold)}
  .times{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
  .times button{padding:9px 0;background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .times button.on{background:rgba(255,176,32,.12);color:var(--gold);border-color:var(--gold)}
  .payout{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;
    background:linear-gradient(135deg,rgba(255,176,32,.1),transparent);border:1px solid var(--gold);
    border-radius:12px;margin:12px 0}
  .payout .l{font-size:12px;color:var(--dim)}
  .payout .pct{font-family:var(--f-disp);font-size:24px;color:var(--gold);line-height:1}
  .payout .win{text-align:right}
  .payout .win .lbl{font-size:10px;color:var(--dim);text-transform:uppercase}
  .payout .win .v{font-family:var(--f-mono);font-weight:700;color:var(--up);font-size:16px}
  .actions{display:flex;gap:10px}
  .actions button{flex:1;padding:16px;border:none;border-radius:14px;font-weight:700;font-size:16px;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s}
  .actions button:active{transform:scale(.97)}
  .actions button:disabled{opacity:.4;cursor:not-allowed}
  .buy{background:linear-gradient(135deg,var(--up),#00a86f);color:#04140d}
  .sell{background:linear-gradient(135deg,var(--down),#d63354);color:#1a0509}
  .actions button small{font-size:10px;opacity:.8;font-weight:500}
  .modal{position:fixed;inset:0;background:rgba(5,8,14,.85);backdrop-filter:blur(6px);z-index:100;
    display:none;align-items:center;justify-content:center;padding:24px}
  .modal.open{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px 24px;text-align:center;
    max-width:340px;width:100%;animation:pop .3s}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .card.w{border-color:var(--up);box-shadow:0 0 40px rgba(0,214,143,.25)}
  .card.l{border-color:var(--down);box-shadow:0 0 40px rgba(255,77,106,.25)}
  .card .ico{font-size:48px;margin-bottom:8px}
  .card h2{font-family:var(--f-disp);font-size:34px;letter-spacing:1px;margin-bottom:4px}
  .card.w h2{color:var(--up)} .card.l h2{color:var(--down)}
  .card .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .card .pl{font-family:var(--f-mono);font-weight:700;font-size:28px;margin-bottom:20px}
  .card.w .pl{color:var(--up)} .card.l .pl{color:var(--down)}
  .card button{width:100%;padding:14px;background:var(--gold);color:#1a1206;border:none;border-radius:12px;
    font-weight:700;font-size:15px;cursor:pointer}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--panel);border:1px solid var(--gold);padding:12px 20px;border-radius:12px;font-size:13px;
    z-index:110;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:90%;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .foot{text-align:center;padding:16px;color:var(--dim);font-size:10px}
  .up-c{color:var(--up)} .down-c{color:var(--down)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="logo">F</div><b>FENIX<span> TRADE</span></b></div>
    <div class="bal"><div class="lbl">Баланс (demo)</div><div class="amt" id="bal">$10 000.00</div></div>
  </header>
  <div class="symrow">
    <div class="symbtn" id="symbtn">
      <div class="l"><span class="tk" id="curTk">BTCUSD</span><span class="nm" id="curNm">Bitcoin</span></div>
      <div style="display:flex;align-items:center">
        <div class="px"><div class="v" id="curPx">—</div><div class="ch" id="curCh"></div></div>
        <span class="chev">▾</span>
      </div>
    </div>
    <div class="search" id="search">
      <input type="text" id="q" placeholder="Поиск монеты...">
      <div class="list" id="list"></div>
    </div>
  </div>
  <div class="tfrow" id="tfrow">
    <button data-tf="1m">1м</button>
    <button data-tf="5m" class="on">5м</button>
    <button data-tf="15m">15м</button>
    <button data-tf="1h">1ч</button>
    <button data-tf="4h">4ч</button>
    <button data-tf="1d">1д</button>
    <span class="sep"></span>
    <button class="ind on" id="emaBtn">EMA</button>
  </div>
  <div class="chart">
    <div id="chartEl"></div>
    <div class="chart-load" id="chartLoad"><span class="spin"></span><span id="loadMsg">Загрузка…</span></div>
    <div class="livebadge"><span class="dot" id="liveDot"></span><span id="livePrice">—</span><span class="src" id="srcTag"></span></div>
  </div>
  <div class="trades" id="tradesBox"></div>
  <div class="panel">
    <div class="fld">
      <label>Сумма сделки</label>
      <div class="amtwrap"><span class="cur">$</span><input type="number" id="amt" value="100" min="1"></div>
      <div class="chips">
        <button data-a="10">$10</button><button data-a="50">$50</button>
        <button data-a="100">$100</button><button data-a="500">$500</button>
      </div>
    </div>
    <div class="fld" style="margin-top:14px">
      <label>Время сделки</label>
      <div class="times" id="times">
        <button class="on" data-t="1">1 мин</button>
        <button data-t="5">5 мин</button>
        <button data-t="15">15 мин</button>
        <button data-t="30">30 мин</button>
      </div>
    </div>
    <div class="payout">
      <div><div class="l">Выплата при выигрыше</div><div class="pct">83%</div></div>
      <div class="win"><div class="lbl">Прибыль</div><div class="v" id="profit">+$83.00</div></div>
    </div>
    <div class="actions">
      <button class="buy" id="buy">ВВЕРХ ▲<small>Buy / Long</small></button>
      <button class="sell" id="sell">ВНИЗ ▼<small>Sell / Short</small></button>
    </div>
  </div>
  <div class="foot">Fenix Trade · Demo · Данные в реальном времени</div>
</div>
<div class="modal" id="modal"><div class="card" id="card">
  <div class="ico" id="rIco"></div><h2 id="rTitle"></h2>
  <div class="sub" id="rSub"></div><div class="pl" id="rPL"></div>
  <button id="rClose">Продолжить</button>
</div></div>
<div class="toast" id="toast"></div>
<script>
const tg = window.Telegram?.WebApp; if(tg){tg.ready();tg.expand();}
const PAYOUT = 0.83;
const MAX_TRADES = 10;
const COINS = [
  ["BTCUSD","Bitcoin","BTC"],["ETHUSD","Ethereum","ETH"],
  ["BNBUSD","BNB","BNB"],["SOLUSD","Solana","SOL"],
  ["XRPUSD","XRP","XRP"],["ADAUSD","Cardano","ADA"],
  ["DOGEUSD","Dogecoin","DOGE"],["AVAXUSD","Avalanche","AVAX"],
  ["TRXUSD","TRON","TRX"],["LINKUSD","Chainlink","LINK"],
  ["DOTUSD","Polkadot","DOT"],["MATICUSD","Polygon","MATIC"],
  ["LTCUSD","Litecoin","LTC"],["BCHUSD","Bitcoin Cash","BCH"],
  ["UNIUSD","Uniswap","UNI"],["ATOMUSD","Cosmos","ATOM"],
  ["XLMUSD","Stellar","XLM"],["NEARUSD","NEAR","NEAR"],
  ["APTUSD","Aptos","APT"],["FILUSD","Filecoin","FIL"],
  ["ARBUSD","Arbitrum","ARB"],["OPUSD","Optimism","OP"],
  ["INJUSD","Injective","INJ"],["SUIUSD","Sui","SUI"],
  ["TONUSD","Toncoin","TON"],["ETCUSD","Ethereum Classic","ETC"],
  ["AAVEUSD","Aave","AAVE"],["ALGOUSD","Algorand","ALGO"],
  ["SHIBUSD","Shiba Inu","SHIB"],["RUNEUSD","THORChain","RUNE"]
];
function baseOf(c){return c[2];}
const TF_SEC = {"1m":60,"5m":300,"15m":900,"1h":3600,"4h":14400,"1d":86400};
const BYBIT = {
  name:"Bybit",
  intmap:{"1m":"1","5m":"5","15m":"15","1h":"60","4h":"240","1d":"D"},
  async klines(base,tf){
    const iv=this.intmap[tf];
    const u=`https://api.bybit.com/v5/market/kline?category=linear&symbol=${base}USDT&interval=${iv}&limit=300`;
    const r=await fetch(u); if(!r.ok)throw 0; const j=await r.json();
    if(j.retCode!==0||!j.result?.list?.length)throw 0;
    return j.result.list.map(k=>({time:Math.floor(+k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4]})).reverse();
  },
  wsUrl(){return "wss://stream.bybit.com/v5/public/linear";},
  wsSub(base,tf){return JSON.stringify({op:"subscribe",args:[`kline.${this.intmap[tf]}.${base}USDT`]});},
  wsParse(msg){
    if(!msg.topic||!msg.topic.startsWith("kline")||!msg.data)return null;
    const k=msg.data[0]; if(!k)return null;
    return {time:Math.floor(+k.start/1000),open:+k.open,high:+k.high,low:+k.low,close:+k.close};
  },
  async tickerPrice(base){
    const r=await fetch(`https://api.bybit.com/v5/market/tickers?category=linear&symbol=${base}USDT`);
    const j=await r.json(); return +j.result.list[0].lastPrice;
  }
};
const OKX = {
  name:"OKX",
  intmap:{"1m":"1m","5m":"5m","15m":"15m","1h":"1H","4h":"4H","1d":"1D"},
  async klines(base,tf){
    const iv=this.intmap[tf];
    const u=`https://www.okx.com/api/v5/market/candles?instId=${base}-USDT-SWAP&bar=${iv}&limit=300`;
    const r=await fetch(u); if(!r.ok)throw 0; const j=await r.json();
    if(j.code!=="0"||!j.data?.length)throw 0;
    return j.data.map(k=>({time:Math.floor(+k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4]})).reverse();
  },
  wsUrl(){return "wss://ws.okx.com:8443/ws/v5/public";},
  wsSub(base,tf){return JSON.stringify({op:"subscribe",args:[{channel:"candle"+this.intmap[tf],instId:`${base}-USDT-SWAP`}]});},
  wsParse(msg){
    if(!msg.data||!msg.arg||!msg.arg.channel?.startsWith("candle"))return null;
    const k=msg.data[0]; if(!k)return null;
    return {time:Math.floor(+k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4]};
  },
  async tickerPrice(base){
    const r=await fetch(`https://www.okx.com/api/v5/market/ticker?instId=${base}-USDT-SWAP`);
    const j=await r.json(); return +j.data[0].last;
  }
};
const BINANCE = {
  name:"Binance",
  intmap:{"1m":"1m","5m":"5m","15m":"15m","1h":"1h","4h":"4h","1d":"1d"},
  async klines(base,tf){
    const u=`https://api.binance.com/api/v3/klines?symbol=${base}USDT&interval=${tf}&limit=300`;
    const r=await fetch(u); if(!r.ok)throw 0; const raw=await r.json();
    if(!Array.isArray(raw)||!raw.length)throw 0;
    return raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4]}));
  },
  wsUrl(base,tf){return `wss://stream.binance.com:9443/ws/${base.toLowerCase()}usdt@kline_${this.intmap[tf]}`;},
  wsSub(){return null;},
  wsParse(msg){
    if(!msg.k)return null; const k=msg.k;
    return {time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c};
  },
  async tickerPrice(base){
    const r=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${base}USDT`);
    const j=await r.json(); return +j.price;
  }
};
const EXCHANGES=[BYBIT,OKX,BINANCE];
let EX=null;
let cur=COINS[0], amount=100, duration=1, balance=10000;
let tf="5m", showEMA=true;
let trades=[]; let tradeSeq=0;
let chart=null, candleSeries=null, emaSeries=null, candles=[], dayOpen=null;
const CDN_LIST=[
  "https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js",
  "https://unpkg.com/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js",
  "https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.7/lightweight-charts.standalone.production.js"
];
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function ensureLib(){
  if(window.LightweightCharts)return true;
  for(const src of CDN_LIST){
    try{await loadScript(src); if(window.LightweightCharts)return true;}catch(e){}
  }
  return false;
}
function buildChart(){
  const {createChart}=LightweightCharts;
  const el=document.getElementById('chartEl');
  chart=createChart(el,{
    layout:{background:{color:'#0d1420'},textColor:'#7d8ba0',fontFamily:"'JetBrains Mono',monospace"},
    grid:{vertLines:{color:'rgba(30,42,61,.4)'},horzLines:{color:'rgba(30,42,61,.4)'}},
    timeScale:{borderColor:'#1e2a3d',timeVisible:true,secondsVisible:false},
    rightPriceScale:{borderColor:'#1e2a3d'},
    crosshair:{mode:0,vertLine:{color:'#ffb020',width:1,style:2,labelBackgroundColor:'#ffb020'},
      horzLine:{color:'#ffb020',width:1,style:2,labelBackgroundColor:'#ffb020'}},
    handleScroll:true,handleScale:true,
  });
  candleSeries=chart.addCandlestickSeries({
    upColor:'#00d68f',downColor:'#ff4d6a',borderUpColor:'#00d68f',borderDownColor:'#ff4d6a',
    wickUpColor:'#00d68f',wickDownColor:'#ff4d6a'});
  emaSeries=chart.addLineSeries({color:'#ffb020',lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  const resize=()=>chart.applyOptions({width:el.clientWidth,height:el.clientHeight});
  window.addEventListener('resize',resize); new ResizeObserver(resize).observe(el); resize();
}
function ema(data,period){
  if(data.length<period)return [];
  const k=2/(period+1),out=[];
  let prev=data.slice(0,period).reduce((s,d)=>s+d.close,0)/period;
  out.push({time:data[period-1].time,value:prev});
  for(let i=period;i<data.length;i++){prev=data[i].close*k+prev*(1-k);out.push({time:data[i].time,value:prev});}
  return out;
}
function applyEMA(){
  if(!emaSeries)return;
  if(showEMA && candles.length>=21)emaSeries.setData(ema(candles,21));
  else emaSeries.setData([]);
}
let ws=null, loadToken=0;
function setLoad(msg,spin=true){
  const l=document.getElementById('chartLoad');
  l.classList.remove('hide');
  document.getElementById('loadMsg').innerHTML=msg;
  l.querySelector('.spin').style.display=spin?'':'none';
}
async function loadChart(){
  const myToken=++loadToken;
  setLoad("Загрузка данных…",true);
  if(ws){try{ws.close();}catch(e){} ws=null;}
  const base=baseOf(cur);
  const order = EX ? [EX,...EXCHANGES.filter(e=>e!==EX)] : EXCHANGES;
  let data=null, used=null;
  for(const ex of order){
    try{ data=await ex.klines(base,tf); used=ex; break; }
    catch(e){ if(myToken!==loadToken)return; }
  }
  if(myToken!==loadToken)return;
  if(!data){
    setLoad('Биржи недоступны с этого IP.<br><span class="retry" onclick="loadChart()">Повторить</span>',false);
    document.getElementById('liveDot').classList.add('off');
    document.getElementById('srcTag').textContent='';
    return;
  }
  EX=used;
  document.getElementById('srcTag').textContent='· '+used.name;
  candles=data;
  candleSeries.setData(candles);
  applyEMA();
  chart.timeScale().fitContent();
  restoreLines();
  dayOpen=candles[0].open;
  updateHeaderPrice(candles.at(-1).close);
  document.getElementById('chartLoad').classList.add('hide');
  openWS(myToken,used,base);
}
function openWS(myToken,ex,base){
  try{
    ws=new WebSocket(ex.wsUrl(base,tf));
    ws.onopen=()=>{ const sub=ex.wsSub(base,tf); if(sub)ws.send(sub); document.getElementById('liveDot').classList.remove('off'); };
    ws.onmessage=(ev)=>{
      if(myToken!==loadToken)return;
      let msg; try{msg=JSON.parse(ev.data);}catch(e){return;}
      const c=ex.wsParse(msg); if(!c)return;
      const last=candles.at(-1);
      if(last && last.time===c.time)candles[candles.length-1]=c;
      else if(last && c.time>last.time)candles.push(c);
      else if(!last)candles.push(c);
      else return;
      candleSeries.update(c);
      applyEMA();
      updateHeaderPrice(c.close);
      updateTradesPnL(c.close);
    };
    ws.onclose=()=>{if(myToken===loadToken)document.getElementById('liveDot').classList.add('off');};
    ws.onerror=()=>{document.getElementById('liveDot').classList.add('off');};
  }catch(e){document.getElementById('liveDot').classList.add('off');}
}
function fmtPx(p){
  if(p>=1000)return p.toLocaleString('en-US',{maximumFractionDigits:2});
  if(p>=1)return p.toFixed(2);
  if(p>=0.01)return p.toFixed(4);
  return p.toFixed(6);
}
function updateHeaderPrice(price){
  document.getElementById('livePrice').textContent='$'+fmtPx(price);
  document.getElementById('curPx').textContent='$'+fmtPx(price);
  if(dayOpen){
    const chg=(price-dayOpen)/dayOpen*100;
    const el=document.getElementById('curCh');
    el.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
    el.className='ch '+(chg>=0?'up-c':'down-c');
  }
}
function renderList(filter=""){
  const f=filter.toLowerCase();
  document.getElementById('list').innerHTML=COINS
    .filter(x=>x[0].toLowerCase().includes(f)||x[1].toLowerCase().includes(f))
    .map(x=>`<div class="it" data-i="${COINS.indexOf(x)}"><span class="tk">${x[0]}</span><span class="nm">${x[1]}</span></div>`).join('');
  document.querySelectorAll('.list .it').forEach(it=>it.onclick=()=>{cur=COINS[+it.dataset.i];setSym();closeSearch();});
}
function setSym(){
  document.getElementById('curTk').textContent=cur[0];
  document.getElementById('curNm').textContent=cur[1];
  document.getElementById('curPx').textContent='—';
  document.getElementById('curCh').textContent='';
  loadChart();
}
function openSearch(){document.getElementById('search').classList.add('open');renderList();document.getElementById('q').focus();}
function closeSearch(){document.getElementById('search').classList.remove('open');document.getElementById('q').value='';}
document.getElementById('symbtn').onclick=()=>document.getElementById('search').classList.contains('open')?closeSearch():openSearch();
document.getElementById('q').oninput=e=>renderList(e.target.value);
document.querySelectorAll('#tfrow button[data-tf]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#tfrow button[data-tf]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); tf=b.dataset.tf; loadChart();
});
document.getElementById('emaBtn').onclick=function(){showEMA=!showEMA;this.classList.toggle('on',showEMA);applyEMA();};
const amtIn=document.getElementById('amt');
function refreshProfit(){amount=Math.max(0,+amtIn.value||0);document.getElementById('profit').textContent='+$'+(amount*PAYOUT).toFixed(2);}
amtIn.oninput=refreshProfit;
document.querySelectorAll('.chips button').forEach(b=>b.onclick=()=>{amtIn.value=b.dataset.a;refreshProfit();});
document.querySelectorAll('#times button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#times button').forEach(x=>x.classList.remove('on'));b.classList.add('on');duration=+b.dataset.t;});
function setBal(){document.getElementById('bal').textContent='$'+balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
let tTO; function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(tTO);tTO=setTimeout(()=>t.classList.remove('show'),2600);}
function currentPrice(){return candles.length?candles.at(-1).close:null;}
function openTrade(dir){
  if(trades.length>=MAX_TRADES){toast("Максимум "+MAX_TRADES+" сделок одновременно");return;}
  const price=currentPrice();
  if(price==null){toast("График ещё загружается");return;}
  if(amount<1){toast("Минимальная сумма $1");return;}
  if(amount>balance){toast("Недостаточно средств");return;}
  balance-=amount; setBal();
  const id=++tradeSeq;
  const color=dir==='up'?'#00d68f':'#ff4d6a';
  const t={id,dir,entry:price,amount,duration,endsAt:Date.now()+duration*60000,coinIdx:COINS.indexOf(cur),base:baseOf(cur),ex:EX,priceLine:null};
  t.priceLine=candleSeries.createPriceLine({price,color,lineWidth:2,lineStyle:2,axisLabelVisible:true,title:(dir==='up'?'▲':'▼')+' $'+amount});
  trades.push(t);
  if(tg)tg.HapticFeedback?.impactOccurred('medium');
  toast((dir==='up'?'▲ ':'▼ ')+cur[0]+" · сделка на "+duration+" мин открыта");
  renderTrades();
}
function settleTrade(t){
  if(t.priceLine){try{candleSeries.removePriceLine(t.priceLine);}catch(e){} t.priceLine=null;}
  const finalize=(exitPrice)=>{
    const win=t.dir==='up'?exitPrice>t.entry:exitPrice<t.entry;
    const tie=exitPrice===t.entry;
    let delta;
    if(tie){delta=0;balance+=t.amount;}
    else if(win){delta=t.amount*PAYOUT;balance+=t.amount+delta;}
    else delta=-t.amount;
    setBal(); trades=trades.filter(x=>x.id!==t.id); renderTrades();
    showResult(t,win,tie,delta,exitPrice);
  };
  if(t.base===baseOf(cur)&&currentPrice()!=null)finalize(currentPrice());
  else (t.ex||EX||BYBIT).tickerPrice(t.base).then(finalize).catch(()=>finalize(t.entry));
}
function updateTradesPnL(price){
  trades.forEach(t=>{
    if(t.base!==baseOf(cur))return;
    const card=document.getElementById('t'+t.id); if(!card)return;
    const winning=t.dir==='up'?price>t.entry:price<t.entry;
    const pnlEl=card.querySelector('.pnl');
    if(price===t.entry){pnlEl.textContent='±$0';pnlEl.style.color='var(--dim)';}
    else{pnlEl.textContent=(winning?'+$':'−$')+(winning?(t.amount*PAYOUT).toFixed(2):t.amount.toFixed(2));pnlEl.style.color=winning?'var(--up)':'var(--down)';}
  });
}
function renderTrades(){
  const box=document.getElementById('tradesBox');
  if(!trades.length){box.innerHTML='';return;}
  box.innerHTML=`<div class="trades-hd"><span>Активные сделки <b>${trades.length}/${MAX_TRADES}</b></span></div>`+
  trades.map(t=>{const tk=COINS[t.coinIdx][0];return `<div class="tcard ${t.dir}" id="t${t.id}">
    <div class="l"><div class="badge">${t.dir==='up'?'▲':'▼'}</div>
      <div class="meta"><div class="top">${tk} · $${t.amount}</div>
      <div class="bot">вход $${fmtPx(t.entry)} · ${t.duration}м</div></div></div>
    <div class="r"><div class="pnl">—</div><div class="cd" id="cd${t.id}">--:--</div></div></div>`;}).join('');
  const p=currentPrice(); if(p!=null)updateTradesPnL(p);
}
function restoreLines(){
  trades.forEach(t=>{
    if(t.priceLine){try{candleSeries.removePriceLine(t.priceLine);}catch(e){} t.priceLine=null;}
    if(t.base===baseOf(cur)){
      const color=t.dir==='up'?'#00d68f':'#ff4d6a';
      t.priceLine=candleSeries.createPriceLine({price:t.entry,color,lineWidth:2,lineStyle:2,axisLabelVisible:true,title:(t.dir==='up'?'▲':'▼')+' $'+t.amount});
    }
  });
}
setInterval(()=>{
  const now=Date.now();
  trades.slice().forEach(t=>{
    const left=Math.max(0,Math.round((t.endsAt-now)/1000));
    const el=document.getElementById('cd'+t.id);
    if(el){const m=Math.floor(left/60),s=left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
    if(now>=t.endsAt)settleTrade(t);
  });
},250);
function showResult(t,win,tie,delta,exitPrice){
  const card=document.getElementById('card'); const tk=COINS[t.coinIdx][0];
  if(tie){
    card.className='card';
    document.getElementById('rIco').textContent='➖';
    document.getElementById('rTitle').textContent='ВОЗВРАТ';
    document.getElementById('rTitle').style.color='var(--gold)';
    document.getElementById('rPL').textContent='$0.00';
    document.getElementById('rPL').style.color='var(--gold)';
  }else{
    card.className='card '+(win?'w':'l');
    document.getElementById('rTitle').style.color='';document.getElementById('rPL').style.color='';
    document.getElementById('rIco').textContent=win?'🎉':'💔';
    document.getElementById('rTitle').textContent=win?'ВЫИГРЫШ':'ПРОИГРЫШ';
    document.getElementById('rPL').textContent=(win?'+$':'−$')+Math.abs(delta).toFixed(2);
  }
  document.getElementById('rSub').innerHTML=`${tk} · вход $${fmtPx(t.entry)} → выход $${fmtPx(exitPrice)}`;
  document.getElementById('modal').classList.add('open');
  if(tg)tg.HapticFeedback?.notificationOccurred?.(win?'success':tie?'warning':'error');
}
document.getElementById('rClose').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('buy').onclick=()=>openTrade('up');
document.getElementById('sell').onclick=()=>openTrade('down');
setBal(); refreshProfit();
(async()=>{
  setLoad("Загрузка графика…",true);
  const ok=await ensureLib();
  if(!ok){setLoad('Не удалось загрузить библиотеку графика.<br><span class="retry" onclick="location.reload()">Обновить</span>',false);return;}
  buildChart();
  loadChart();
})();
</script>
